name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (with dev extras)
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Conformance + schema tests
        run: pytest tests/ -v

      - name: Demo smoke run
        run: python demo.py

  cross-language-hash:
    # Independent second-language implementation must reproduce the frozen hash
    # vectors byte-for-byte — makes the cross-language parity claim a real gate,
    # not a Python-checks-itself tautology (wire-protocol.md §7).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cross-language hash parity (JS reproduces frozen vectors)
        run: node js/check_vectors.js
